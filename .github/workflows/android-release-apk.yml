name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/aapada-v${{ steps.app_version.outputs.value }}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapada-android-apk
          path: dist/*.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('apk-v{0}-{1}', steps.app_version.outputs.value, github.run_number) }}
          name: ${{ format('Aapada APK v{0}', steps.app_version.outputs.value) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          files: dist/*.apk
