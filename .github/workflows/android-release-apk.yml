name: Android APK Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          echo "value=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate Android project if missing
        run: |
          if [ ! -f android/gradlew ]; then
            npx expo prebuild --platform android --non-interactive
          fi

      - name: Configure release signing (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No release keystore secret found, using default debug signing."
            exit 0
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

          printf '%s\n' "MYAPP_UPLOAD_STORE_FILE=release-keystore.jks" >> android/gradle.properties
          printf '%s\n' "MYAPP_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> android/gradle.properties
          printf '%s\n' "MYAPP_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> android/gradle.properties
          printf '%s\n' "MYAPP_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> android/gradle.properties

          printf '%s\n' "if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {" >> android/app/build.gradle
          printf '%s\n' "    android {" >> android/app/build.gradle
          printf '%s\n' "        signingConfigs {" >> android/app/build.gradle
          printf '%s\n' "            release {" >> android/app/build.gradle
          printf '%s\n' "                storeFile file(MYAPP_UPLOAD_STORE_FILE)" >> android/app/build.gradle
          printf '%s\n' "                storePassword MYAPP_UPLOAD_STORE_PASSWORD" >> android/app/build.gradle
          printf '%s\n' "                keyAlias MYAPP_UPLOAD_KEY_ALIAS" >> android/app/build.gradle
          printf '%s\n' "                keyPassword MYAPP_UPLOAD_KEY_PASSWORD" >> android/app/build.gradle
          printf '%s\n' "            }" >> android/app/build.gradle
          printf '%s\n' "        }" >> android/app/build.gradle
          printf '%s\n' "        buildTypes {" >> android/app/build.gradle
          printf '%s\n' "            release {" >> android/app/build.gradle
          printf '%s\n' "                signingConfig signingConfigs.release" >> android/app/build.gradle
          printf '%s\n' "            }" >> android/app/build.gradle
          printf '%s\n' "        }" >> android/app/build.gradle
          printf '%s\n' "    }" >> android/app/build.gradle
          printf '%s\n' "}" >> android/app/build.gradle

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/aapada-v${{ steps.app_version.outputs.value }}.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapada-android-apk
          path: dist/*.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('apk-v{0}-{1}', steps.app_version.outputs.value, github.run_number) }}
          name: ${{ format('Aapada APK v{0}', steps.app_version.outputs.value) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_type != 'tag' }}
          generate_release_notes: true
          files: dist/*.apk
